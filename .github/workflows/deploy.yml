name: Deploy HF Space

on:
  push:
    branches:
      - main
    paths:
      - 'llm_dashboard/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Clone HF Space
        run: |
          git clone https://YOUR_HF_USERNAME:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/YOUR_HF_USERNAME/LLM_tryout

      - name: Copy Dashboard Files
        run: |
          rm -rf space/*
          cp -r llm_dashboard/* space/

      - name: Push To HF Space
        run: |
          cd space
          git config user.email "actions@github.com"
          git config user.name "github-actions"

          git add .
          git commit -m "Auto deploy" || echo "No changes"
          git push