name: Deploy HF Space

on:
  push:
    branches:
      - main
    paths:
      - "19_jun_llm_tryout/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone HF Space
        run: |
          git clone https://${{ secrets.HF_USERNAME }}:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ secrets.HF_USERNAME }}/LLM_tryout space

      - name: Copy Files
        run: |
          rsync -av --delete 19_jun_llm_tryout/ space/

      - name: Commit & Push
        run: |
          cd space
          git config user.email "actions@github.com"
          git config user.name "github-actions"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto deploy"
          git push